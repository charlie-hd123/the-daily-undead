<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#070a12">
    <meta
      name="description"
      content="The Daily Undead — your daily Treyarch Zombies challenge. Reveal clues, identify the map, and put the steps in order."
    >
    <title>The Daily Undead</title>
    <link rel="icon" href="./assets/favicon.png?v=20260723-2" type="image/png" sizes="128x128">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" sizes="180x180">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./styles.css?v=20260723-15">
  </head>
  <body>
    <header class="site-header">
      <div class="brand-lockup">
        <img class="brand-logo" src="./assets/zombie-logo.png" alt="" width="512" height="512">
        <div class="brand-copy">
          <p class="eyebrow">Your daily Treyarch Zombies challenge</p>
          <h1>The Daily Undead</h1>
        </div>
      </div>
      <div class="header-meta">
        <p id="puzzle-date" class="puzzle-date"></p>
        <p class="streak-display">Streak <strong id="streak-count">0</strong></p>
      </div>
    </header>

    <main id="app" class="app-shell" aria-live="polite">
      <section class="panel loading-panel">
        <h2>Loading today’s puzzle…</h2>
      </section>
    </main>

    <noscript>
      <p class="noscript">This game needs JavaScript enabled.</p>
    </noscript>

    <template id="clue-template">
      <article class="clue-card">
        <p class="clue-number"></p>
        <p class="clue-text"></p>
      </article>
    </template>

    <script type="module" src="./js/app.js?v=20260723-3"></script>
  </body>
</html>
